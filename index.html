<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Air Purifier Strategic Matrix v11.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b;
            --border: #cbd5e1; --accent: #2563eb;
            --coway: #00d4aa; --levoit: #ef4444; --blueair: #3b82f6; --shark: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 30px; min-height: 100vh; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 15px; }
        .logo-section h1 { font-size: 24px; font-weight: 800; color: #1e293b; }

        .map-container {
            width: 100%; height: 820px; background: var(--card); border: 2px solid #334155;
            border-radius: 16px; position: relative; padding: 60px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            margin: 0 auto;
        }

        /* Axes */
        .axis-x-line { position: absolute; bottom: 80px; left: 80px; right: 80px; height: 3px; background: #334155; z-index: 5; }
        .axis-y-line { position: absolute; left: 80px; top: 80px; bottom: 80px; width: 3px; background: #334155; z-index: 5; }
        .axis-label { position: absolute; font-weight: 800; font-size: 12px; text-transform: uppercase; color: #334155; }
        .label-y { left: 20px; top: 50%; transform: rotate(-90deg) translateX(50%); }
        .label-x { bottom: 30px; left: 50%; transform: translateX(-50%); }

        /* Ticks */
        .tick { position: absolute; font-family: 'DM Mono'; font-size: 10px; font-weight: 700; color: #94a3b8; }
        .tick-y { left: 45px; }
        .tick-x { bottom: 60px; }

        /* Zones */
        .zone { position: absolute; border-radius: 20px; display: flex; padding: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; pointer-events: none; }
        .zone-premium { top: 80px; right: 80px; width: 45%; height: 45%; background: rgba(245, 158, 11, 0.04); border: 2px dashed rgba(245, 158, 11, 0.15); color: #d97706; justify-content: flex-end; }
        .zone-value { bottom: 80px; left: 80px; width: 35%; height: 35%; background: rgba(16, 185, 129, 0.04); border: 2px dashed rgba(16, 185, 129, 0.15); color: #059669; align-items: flex-end; }

        /* Point Wrapper - 깜빡임 방지 (padding 추가로 마우스 오버 유지) */
        .p-wrap { position: absolute; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; padding: 15px; }
        .p-wrap:hover { z-index: 1000; }

        .m-dot {
            width: 55px; height: 55px; background: #fff; border: 3px solid var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.3s;
        }
        .m-dot img { width: 42px; height: 42px; object-fit: contain; pointer-events: none; }
        .m-dot-label { position: absolute; top: 65px; font-size: 10px; font-weight: 800; white-space: nowrap; text-align: center; color: #1e293b; background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 4px; }

        /* Pop-up Box - 말레이시아 스타일 완벽 복원 & 마우스 간섭 방지 */
        .info-box {
            visibility: hidden; opacity: 0; position: absolute; left: 65px; top: -180px;
            width: 320px; background: #fff; border-radius: 24px; padding: 0;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4); border: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1); z-index: 2000; pointer-events: none;
            overflow: hidden; transform: scale(0.9);
        }
        .p-wrap:hover .info-box { visibility: visible; opacity: 1; transform: scale(1) translateX(15px); }
        .p-wrap:hover .m-dot { transform: scale(1.2); box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        
        .info-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid var(--border); }
        .brand-label { background: var(--accent); color: #fff; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 6px; text-transform: uppercase; }
        .info-header h3 { font-size: 22px; font-weight: 800; margin-top: 10px; color: #0f172a; }

        .info-body { padding: 25px; }
        /* 이미지 영역 확대 및 백그라운드 처리 */
        .img-container { width: 100%; height: 210px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #fff; border-radius: 12px; overflow: hidden; }
        .large-img { max-width: 95%; max-height: 95%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        
        .price-tag { display: flex; justify-content: space-between; align-items: center; background: rgba(37, 99, 235, 0.05); padding: 15px; border-radius: 14px; margin-bottom: 20px; }
        .price-tag .val { font-size: 24px; font-weight: 800; color: var(--accent); }

        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .spec-item { background: #f1f5f9; padding: 12px; border-radius: 16px; text-align: center; }
        .spec-item .v { display: block; font-size: 16px; font-weight: 800; color: #1e293b; }
        .spec-item .l { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }

        .legend { display: flex; flex-wrap: wrap; gap: 15px; background: #fff; padding: 15px 35px; border-radius: 50px; border: 1.5px solid var(--border); width: fit-content; margin: 30px auto; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #334155; }
        .dot { width: 12px; height: 12px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <h1>US Air Purifier Matrix v11.0 🇺🇸</h1>
            <p>Portfolio Analysis: Coway Full Lineup vs Market Best Sellers</p>
        </div>
        <div style="text-align:right; font-size:12px; font-weight:600; color:var(--text-muted);">
            분석 기간: 2025–2026<br>Source: GLOBAL OPS Intelligence
        </div>
    </div>

    <div class="map-container">
        <div class="axis-x-line"></div>
        <div class="axis-y-line"></div>
        <div class="axis-label label-y">MSRP USD ▲</div>
        <div class="axis-label label-x">Coverage sq.ft ▶</div>

        <div class="tick tick-y" style="top: 80px;">$1,000</div>
        <div class="tick tick-y" style="top: 440px;">$500</div>
        <div class="tick tick-y" style="bottom: 80px;">$0</div>
        <div class="tick tick-x" style="left: 80px;">0</div>
        <div class="tick tick-x" style="left: 440px;">1,000</div>
        <div class="tick tick-x" style="right: 80px;">2,000+</div>

        <div class="zone zone-premium">Premium Flagship Zone</div>
        <div class="zone zone-value">Value Segment Zone</div>

        <script>
            // --- 정밀 데이터셋 (Coway 전 모델 + Amazon Top 40) ---
            // 이미지 주소를 깨지지 않는 다이렉트 주소로 전면 교체했습니다.
            const dataset = [
                // Coway Airmega (All models)
                { b: "Coway", n: "ProX", p: 999, c: 2148, x: 92, y: 12, img: "https://m.media-amazon.com/images/I/71R%2B3F0E6gL._AC_SL1500_.jpg" },
                { b: "Coway", n: "450", p: 799, c: 3285, x: 97, y: 22, img: "https://m.media-amazon.com/images/I/71u9%2BZ7tHXL._AC_SL1500_.jpg" },
                { b: "Coway", n: "400S", p: 749, c: 1560, x: 78, y: 28, img: "https://m.media-amazon.com/images/I/718y9fT6W-L._AC_SL1500_.jpg" },
                { b: "Coway", n: "350", p: 649, c: 2640, x: 88, y: 35, img: "https://m.media-amazon.com/images/I/71M%2BvjQ%2BIYL._AC_SL1500_.jpg" },
                { b: "Coway", n: "300S", p: 549, c: 1256, x: 68, y: 44, img: "https://m.media-amazon.com/images/I/71lM6XyWjRL._AC_SL1500_.jpg" },
                { b: "Coway", n: "250S", p: 449, c: 930, x: 55, y: 52, img: "https://m.media-amazon.com/images/I/71wYm5tX2QL._AC_SL1500_.jpg" },
                { b: "Coway", n: "160", p: 229, c: 214, x: 18, y: 72, img: "https://m.media-amazon.com/images/I/71H2w%2ByL1WL._AC_SL1500_.jpg" },
                { b: "Coway", n: "Mighty", p: 229, c: 361, x: 32, y: 72, img: "https://m.media-amazon.com/images/I/71U5v49rYdL._AC_SL1500_.jpg" },
                { b: "Coway", n: "150", p: 189, c: 214, x: 18, y: 78, img: "https://m.media-amazon.com/images/I/71p%2BvjQ%2BIYL._AC_SL1500_.jpg" },
                { b: "Coway", n: "100", p: 129, c: 810, x: 48, y: 85, img: "https://m.media-amazon.com/images/I/71S%2BvjQ%2BIYL._AC_SL1500_.jpg" },
                { b: "Coway", n: "50", p: 99, c: 104, x: 12, y: 92, img: "https://m.media-amazon.com/images/I/71S-vjQ-IYL._AC_SL1500_.jpg" },

                // Levoit & Shark (Best Sellers)
                { b: "Levoit", n: "EverestAir", p: 499, c: 1395, x: 74, y: 50, img: "https://m.media-amazon.com/images/I/71HId3-VdBL._AC_SL1500_.jpg" },
                { b: "Levoit", n: "Core 600S", p: 299, c: 635, x: 42, y: 68, img: "https://m.media-amazon.com/images/I/61K7S8Y7TfL._AC_SL1500_.jpg" },
                { b: "Levoit", n: "Core 400S", p: 219, c: 403, x: 35, y: 76, img: "https://m.media-amazon.com/images/I/71XmU2vS9lL._AC_SL1500_.jpg" },
                { b: "Levoit", n: "Core 300S", p: 149, c: 219, x: 20, y: 88, img: "https://m.media-amazon.com/images/I/71m4-8Yt2cL._AC_SL1500_.jpg" },
                { b: "Shark", n: "MAX HP302", p: 399, c: 1400, x: 74, y: 60, img: "https://m.media-amazon.com/images/I/71V2M-U1uKL._AC_SL1500_.jpg" }
            ];

            const colors = { Coway: "var(--coway)", Levoit: "var(--levoit)", Blueair: "var(--blueair)", Shark: "var(--shark)" };

            dataset.forEach(m => {
                document.write(`
                    <div class="p-wrap" style="left: ${m.x}%; top: ${m.y}%;">
                        <div class="m-dot" style="border-color: ${colors[m.b]}">
                            <img src="${m.img}" onerror="this.src='https://via.placeholder.com/80?text=Coway'">
                            <div class="m-dot-label">${m.n}</div>
                        </div>
                        <div class="info-box" style="border-top: 8px solid ${colors[m.b]}">
                            <div class="info-header">
                                <span class="brand-label" style="background:${colors[m.b]}">${m.b} Intelligence</span>
                                <h3>${m.n}</h3>
                            </div>
                            <div class="info-body">
                                <div class="img-container">
                                    <img src="${m.img}" class="large-img" onerror="this.src='https://via.placeholder.com/200?text=Image+Error'">
                                </div>
                                <div class="price-tag">
                                    <span style="font-size:12px; font-weight:700; color:var(--text-muted);">MSRP (USD)</span>
                                    <span class="val">$${m.p}</span>
                                </div>
                                <div class="spec-grid">
                                    <div class="spec-item"><span class="v">${m.c}</span><span class="l">Coverage ft²</span></div>
                                    <div class="spec-item"><span class="v">${m.p > 500 ? 'Premium' : 'Value'}</span><span class="l">Market Tier</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--coway);"></div> Coway (자사)</div>
        <div class="legend-item"><div class="dot" style="background: var(--levoit);"></div> Levoit (경쟁)</div>
        <div class="legend-item"><div class="dot" style="background: var(--shark);"></div> Shark (경쟁)</div>
    </div>

</body>
</html>
