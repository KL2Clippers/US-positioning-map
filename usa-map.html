<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL OPS — US Positioning Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --accent: #4a9fff;
            --coway: #00d4aa; --rabbitair: #a78bfa; --comp: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 40px; min-height: 100vh; }
        
        .header { margin-bottom: 30px; border-bottom: 2px solid #1e293b; padding-bottom: 15px; }
        .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #1e293b; }
        .header p { font-size: 14px; color: var(--text-muted); margin-top: 5px; }

        /* Map Container */
        .map-container {
            width: 100%; height: 750px; background: var(--card); border: 2px solid #1e293b;
            border-radius: 12px; position: relative; padding: 80px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin: 0 auto;
        }

        /* Axis Lines */
        .axis-x-line { position: absolute; bottom: 80px; left: 80px; right: 80px; height: 3px; background: #1e293b; z-index: 5; }
        .axis-y-line { position: absolute; left: 80px; top: 80px; bottom: 80px; width: 3px; background: #1e293b; z-index: 5; }

        /* Axis Arrowheads */
        .axis-x-line::after { content: ''; position: absolute; right: -10px; top: -6px; border-left: 12px solid #1e293b; border-top: 8px solid transparent; border-bottom: 8px solid transparent; }
        .axis-y-line::after { content: ''; position: absolute; top: -10px; left: -6px; border-bottom: 12px solid #1e293b; border-left: 8px solid transparent; border-right: 8px solid transparent; }

        /* Axis Labels */
        .axis-label { position: absolute; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; color: #1e293b; }
        .label-y { left: 25px; top: 50%; transform: rotate(-90deg) translateX(50%); }
        .label-x { bottom: 35px; left: 50%; transform: translateX(-50%); }

        /* Grid Background Zones */
        .zone { position: absolute; display: flex; padding: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; pointer-events: none; }
        .zone-premium { top: 80px; right: 80px; width: 45%; height: 45%; background: rgba(255,179,64,0.05); border: 1.5px dashed rgba(255,179,64,0.3); border-radius: 0 0 0 40px; align-items: flex-start; justify-content: flex-end; color: #ffb340; }
        .zone-value { bottom: 80px; left: 80px; width: 40%; height: 40%; background: rgba(0,212,170,0.05); border: 1.5px dashed rgba(0,212,170,0.3); border-radius: 0 40px 0 0; align-items: flex-end; justify-content: flex-start; color: #00d4aa; }

        /* Model Cards */
        .model-card {
            position: absolute; width: 160px; background: #fff; border: 1px solid var(--border);
            border-radius: 12px; padding: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transform: translate(-50%, -50%); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; z-index: 10;
        }
        .model-card:hover { transform: translate(-50%, -60%) scale(1.08); z-index: 100; border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        
        .m-brand { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .m-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; line-height: 1.2; color: #1e293b; }
        .m-price { font-size: 13px; font-weight: 700; font-family: 'DM Mono'; color: #475569; }

        /* Interactive Tooltip */
        .tooltip {
            display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            width: 200px; background: #1e293b; color: #fff; padding: 15px; border-radius: 10px; font-size: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); pointer-events: none; z-index: 200;
        }
        .model-card:hover .tooltip { display: block; }
        .tooltip b { color: var(--accent); display: block; margin-bottom: 6px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .tooltip span { display: block; margin-top: 4px; opacity: 0.8; font-size: 11px; line-height: 1.4; }

        /* Legend Footer */
        .legend { display: flex; gap: 30px; margin-top: 40px; justify-content: center; background: #fff; padding: 20px; border-radius: 50px; border: 1px solid var(--border); width: fit-content; margin-left: auto; margin-right: auto; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: #334155; }
        .dot { width: 14px; height: 14px; border-radius: 4px; }

        @media (max-width: 768px) { .map-container { height: 500px; padding: 40px; } .model-card { width: 120px; padding: 8px; } }
    </style>
</head>
